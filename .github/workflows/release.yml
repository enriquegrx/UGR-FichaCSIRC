name: Release

# Se dispara al subir una etiqueta de version (ej. v2.1):
#   git tag v2.1 && git push origin v2.1
# Construye los .exe y los publica como Release de GitHub.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        # PyInstaller fijado: evita que un bootloader nuevo cambie el manejo del
        # empaquetado sin avisar (build reproducible).
        run: pip install requests pyinstaller==6.21.0

      - name: Ejecutar tests
        run: python -m unittest discover -s tests -t . -v

      # Modo CARPETA (--onedir), no --onefile: el .exe se ejecuta junto a su
      # carpeta _internal (con python3XX.dll y el runtime VC) y NO se extrae nada
      # a %TEMP%\_MEI. Asi se evita el error "Failed to load Python DLL" al lanzar
      # el .exe recien instalado desde el instalador. --noupx como blindaje extra.
      - name: Construir FichaCSIRC (carpeta)
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed --noupx
          --name "FichaCSIRC" --icon "fichacsirc.ico"
          --version-file "version_info.txt"
          --add-data "logo_ugr.png;." --add-data "fichacsirc.ico;."
          registrar_gui.py

      - name: Construir FichaCSIRC-Configurar (carpeta)
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed --noupx
          --name "FichaCSIRC-Configurar" --icon "fichacsirc.ico"
          --version-file "version_info.txt"
          --add-data "logo_ugr.png;." --add-data "fichacsirc.ico;."
          configurar_gui.py

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Construir instalador único
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          iscc /DMyAppVersion=$v instalador.iss

      # Con --onedir ya no hay .exe suelto portable (el exe necesita su carpeta
      # _internal al lado). Se publica solo el instalador, que empaqueta ambas
      # carpetas; es tambien lo que descarga el autoactualizador.
      - name: Publicar release con el instalador
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FichaCSIRC-Instalador.exe
          generate_release_notes: true

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-26-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar tests
        run: python -m unittest discover -s tests -t . -v

      - name: Construir apps macOS
        run: ARCH_LABEL=${{ matrix.arch }} ./build_macos.sh

      - name: Publicar release con apps macOS
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FichaCSIRC-mac-${{ matrix.arch }}.zip
