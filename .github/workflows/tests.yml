name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install requests
      - name: Ejecutar tests
        run: python -m unittest discover -s tests -t . -v
